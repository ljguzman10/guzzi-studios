<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — GUZZI STUDIOS</title>
  <!-- Tailwind CSS CDN for elegant look in static login page -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body class="bg-[#0C0C0C] text-white flex items-center justify-center min-h-screen p-4 selection:bg-white selection:text-black">
  <div class="w-full max-w-md bg-black border border-white/10 p-8 md:p-10 space-y-8 relative overflow-hidden">
    <!-- Subtle Ambient Glow -->
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-white/[0.02] rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-white/[0.01] rounded-full blur-3xl pointer-events-none"></div>

    <div class="text-center space-y-2 relative">
      <div class="inline-block border border-white/20 px-3 py-1 text-[10px] tracking-[0.3em] uppercase text-white/50 font-mono mb-2">
        Protected Workspace
      </div>
      <h1 class="text-2xl md:text-3xl tracking-tight font-light text-white">
        GUZZI <span class="font-normal text-white/40">STUDIOS</span>
      </h1>
      <p class="text-xs text-white/40 font-mono uppercase tracking-[0.2em] pt-1">
        Administrator Access
      </p>
    </div>

    <!-- Error Banner (Conditional) -->
    <div id="error-banner" class="hidden border border-red-500/30 bg-red-500/10 text-red-400 p-4 text-xs tracking-wide leading-relaxed font-mono">
      Authentication Failed: Invalid administrator credentials or expired session. Please verify and try again.
    </div>

    <form id="login-form" class="space-y-6 relative">
      <div class="space-y-2">
        <label for="username" class="block text-[10px] tracking-[0.2em] uppercase text-white/50 font-mono font-medium">
          Username
        </label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          required 
          autocomplete="username"
          class="w-full bg-white/[0.03] border border-white/10 px-4 py-3.5 text-sm text-white focus:outline-none focus:border-white focus:bg-white/[0.06] transition-all duration-300 font-mono"
          placeholder="admin_id"
        />
      </div>

      <div class="space-y-2">
        <label for="password" class="block text-[10px] tracking-[0.2em] uppercase text-white/50 font-mono font-medium">
          Password
        </label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          autocomplete="current-password"
          class="w-full bg-white/[0.03] border border-white/10 px-4 py-3.5 text-sm text-white focus:outline-none focus:border-white focus:bg-white/[0.06] transition-all duration-300 font-mono"
          placeholder="••••••••••••"
        />
      </div>

      <button 
        type="submit" 
        id="submit-button"
        class="w-full bg-white text-[#0C0C0C] hover:bg-white/90 active:scale-[0.98] py-4 text-xs font-bold tracking-[0.3em] uppercase transition-all duration-300 cursor-pointer font-mono"
      >
        Sign In &rarr;
      </button>
    </form>

    <div class="text-center pt-2 relative">
      <a href="/" class="text-[10px] text-white/40 hover:text-white transition-colors duration-300 tracking-wider font-mono">
        &larr; Return to main site
      </a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBanner = document.getElementById('error-banner');
    const submitBtn = document.getElementById('submit-button');

    // Simple query param parser to show error banner on failed login attempt
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === '1') {
      errorBanner.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'AUTHENTICATING...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        if (response.ok) {
          const data = await response.json();
          if (data.token) {
            // Save token securely in localStorage for cross-site iframe persistence
            localStorage.setItem('admin_token', data.token);
            // Redirect to admin landing view
            window.location.href = `/?admin=true&token=${data.token}`;
          } else {
            window.location.href = '/?admin=true';
          }
        } else {
          errorBanner.textContent = 'Authentication Failed: Invalid administrator credentials. Please try again.';
          errorBanner.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign In &rarr;';
        }
      } catch (err) {
        console.error(err);
        errorBanner.textContent = 'Network Error: Unable to reach secure auth gateway.';
        errorBanner.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In &rarr;';
      }
    });
  </script>
</body>
</html>
